<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle League - Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="title">Wordle League</h1>
            <p class="subtitle">Daily Wordle Score Tracking</p>
        </div>
    </header>
    
    <div class="container">
        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-button active" data-tab="latest">Latest Scores</button>
                <button class="tab-button" data-tab="stats">Player Stats</button>
            </div>
            
            <div id="latest" class="tab-content active">
                <h2>Wordle #1495 Scores</h2>
                
                <div class="wordle-links">
                    
                        <a href="wordle-1495.html" class="wordle-link current">
                            #1495
                        </a>
                    
                </div>
                
                
                    <div class="score-card">
                        <div class="player-info">
                            <div class="player-name">Brent</div>
                        </div>
                        
                        <div class="score-4 score-display">
                            4/6
                        </div>
                        
                    </div>
                
                    <div class="score-card">
                        <div class="player-info">
                            <div class="player-name">Evan</div>
                        </div>
                        
                        <div class="score-none score-display">
                            No Score Posted
                        </div>
                        
                    </div>
                
                    <div class="score-card">
                        <div class="player-info">
                            <div class="player-name">Joanna</div>
                        </div>
                        
                        <div class="score-none score-display">
                            No Score Posted
                        </div>
                        
                    </div>
                
                    <div class="score-card">
                        <div class="player-info">
                            <div class="player-name">Malia</div>
                        </div>
                        
                        <div class="score-none score-display">
                            No Score Posted
                        </div>
                        
                    </div>
                
                    <div class="score-card">
                        <div class="player-info">
                            <div class="player-name">Nanna</div>
                        </div>
                        
                        <div class="score-none score-display">
                            No Score Posted
                        </div>
                        
                    </div>
                
            </div>
            
            <div id="stats" class="tab-content">
                <h2>Player Statistics</h2>
                
                <div class="card">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Games</th>
                                <th>Avg Score</th>
                                <th>Perfect Games</th>
                                <th>Success Rate</th>
                            </tr>
                        </thead>
                        <tbody>
                            
                                <tr>
                                    <td>Brent</td>
                                    <td>1</td>
                                    <td>4.0</td>
                                    <td>0</td>
                                    <td>100.0%</td>
                                </tr>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
